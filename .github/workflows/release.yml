name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Pack & Publish to NuGet
    # Packing without CITargetFramework builds all three TFMs (net10.0, -android, -ios), so this
    # needs both workloads plus Xcode on one machine -- macOS is the only runner that has all three.
    runs-on: macos-latest
    permissions:
      id-token: write # required so NuGet/login can request a GitHub OIDC token
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      # Guards against tagging a commit where Directory.Build.props' Version wasn't bumped to match.
      - name: Verify tag matches project version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          prop_version=$(grep -oE '<Version>[^<]+</Version>' Directory.Build.props | sed -E 's/<\/?Version>//g')
          if [ "$tag_version" != "$prop_version" ]; then
            echo "Tag version ($tag_version) does not match Directory.Build.props Version ($prop_version)"
            exit 1
          fi

      # .NET Android SDK requires JDK 21 and rejects newer versions (XA0030).
      - name: Setup JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a  # v5
        with:
          distribution: microsoft
          java-version: '21'

      # Pinned to match the ios job in ci.yml -- keep both in sync when the iOS workload moves.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90  # v1
        with:
          xcode-version: '26.6'

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Install Android workload
        run: dotnet workload install android

      # Pinned to match the ios job in ci.yml -- keep both in sync when the iOS workload moves.
      - name: Install iOS workload
        run: dotnet workload install ios --version 10.0.302

      - name: Test
        run: dotnet test tests/DuraIT.Avalonia.AdMob.UnitTests/DuraIT.Avalonia.AdMob.UnitTests.csproj -c Release -p:CITargetFramework=net10.0

      - name: Pack
        run: dotnet pack src/DuraIT.Avalonia.AdMob/DuraIT.Avalonia.AdMob.csproj -c Release

      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841  # v1 (v1.2.0)
        id: login
        with:
          user: DuraITSolutions

      - name: Push to NuGet
        run: dotnet nuget push "artifacts/bin/DuraIT.Avalonia.AdMob/Release/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate